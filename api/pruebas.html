<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>Pruebas api</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			crossorigin="anonymous" />
	</head>
	<body>
		<div class="container mt-4">
			<div id="infoJugadores3"></div>
		</div>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
			crossorigin="anonymous"></script>

		<script>
			function formatearInfoJugadores(jugador) {
				const respuesta = `
					<div class="col-12 col-md-6 col-xl-4">
						<article class="card border-0 shadow-sm h-100">
							<div class="card-body">
								<div class="d-flex justify-content-between align-items-start mb-3">
									<div>
										<h3 class="h5 mb-1">${jugador.player_name}</h3>
										<p class="text-secondary mb-0">${jugador.player_country}</p>
									</div>
									<span class="badge text-bg-success">Jugador</span>
								</div>

								<ul class="list-unstyled mb-0">
									<li><strong>Fecha de nacimiento:</strong> ${jugador.player_bday || "N/D"}</li>
									<li><strong>Títulos:</strong> ....</li>
									<li><strong>Superficie fuerte:</strong> ....</li>
								</ul>
							</div>
						</article>
					</div>
				`;
				return respuesta;
			}

			fetch(
				"https://api.api-tennis.com/tennis/?method=get_players&player_key=1905&APIkey=fcd8e4e3602130a6a1df894b6c5549eb9ae9a5859896677164ba5fea76b271c5",
			)
				.then((respuesta) => respuesta.json())
				.then((datos) => {
					const contenedorInformacion =
						document.getElementById("infoJugadores3");

					if (datos.success === 1 && datos.result.length > 0) {
						const jugador = datos.result[0];
						contenedorInformacion.innerHTML = formatearInfoJugadores(jugador);
						console.log(jugador);
					} else {
						contenedorInformacion.innerHTML =
							"<p>No se encontró información del jugador.</p>";
					}
				})
				.catch((error) => console.error("Error al obtener los datos:", error));
		</script>
	</body>
</html>
