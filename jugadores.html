		<main>
			<section
				id="jugadores"
				class="section-space">
				<div class="container">
					<div class="section-heading mb-4">
						<span class="seccion-titulos">Jugadores</span>
						<h2 class="section-title mb-1">Ranking ATP</h2>
						<p class="mb-0 text-body-secondary">Top 100 jugadores</p>
					</div>

					<div class="card border-0 shadow-sm rounded-4 mb-4">
						<div class="card-body p-4">
							<h3 class="h5 mb-3">Buscar jugador por ID</h3>

							<div class="row g-2 align-items-end">
								<div class="col-md-4">
									<label
										for="inputJugadorId"
										class="form-label"
										>ID del jugador</label
									>
									<input
										type="number"
										id="inputJugadorId"
										class="form-control"
										placeholder="Ej. 3782" />
								</div>

								<div class="col-md-auto">
									<button
										id="btnBuscarJugador"
										type="button"
										class="btn btn-success">
										Buscar jugador
									</button>
								</div>

								<div class="col-md-auto">
									<button
										id="btnLimpiarBusquedaJugador"
										type="button"
										class="btn btn-outline-secondary">
										Limpiar
									</button>
								</div>
							</div>

							<div
								id="estadoBusquedaJugador"
								class="mt-3"></div>
							<div
								id="resultadoBusquedaJugador"
								class="mt-3"></div>
						</div>
					</div>

					<div class="card border-0 shadow-sm rounded-4">
						<div class="card-body p-4">
							<div
								id="estadoRanking"
								class="mb-3">
								Cargando ranking...
							</div>

							<div class="table-responsive">
								<table class="table table-hover align-middle table-ranking">
									<thead>
										<tr>
											<th>Ranking</th>
											<th>Nombre</th>
											<th>Edad</th>
											<th>País</th>
											<th>Año debut</th>
											<th>Link</th>
										</tr>
									</thead>
									<tbody id="ranking-body"></tbody>
								</table>
							</div>

							<div
								class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-3">
								<div
									id="info-paginacion-ranking"
									class="small text-body-secondary"></div>

								<div class="d-flex gap-2">
									<button
										id="btn-anterior-ranking"
										type="button"
										class="btn btn-outline-secondary">
										Anterior
									</button>
									<button
										id="btn-siguiente-ranking"
										type="button"
										class="btn btn-success">
										Siguiente
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</section>
