<!doctype html>
<html
	lang="es"
	data-bs-theme="light">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>Top Tenis Stats Partidos</title>

		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet" />

		<!-- Iconos de bootstrap para navbar -->
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

		<link
			rel="stylesheet"
			href="css/styles.css" />
	</head>
	<body>
		<header class="site-header sticky-top">
			<nav class="navbar navbar-expand-lg border-bottom shadow-sm">
				<div class="container py-2">
					<a
						class="navbar-brand d-flex align-items-center gap-2 fw-bold brand-title"
						href="index.html">
						<i class="bi bi-trophy fs-3"></i>
						<span>Top Tenis Stats</span>
					</a>

					<div class="d-flex align-items-center gap-2 order-lg-2">
						<button
							id="temaToggle"
							class="btn btn-tema-toggle"
							type="button"
							aria-label="Cambiar tema">
							<i class="bi bi-moon-stars-fill"></i>
						</button>

						<button
							class="navbar-toggler"
							type="button"
							data-bs-toggle="collapse"
							data-bs-target="#mainNavbar"
							aria-controls="mainNavbar"
							aria-expanded="false"
							aria-label="Toggle navigation">
							<span class="navbar-toggler-icon"></span>
						</button>
					</div>

					<div
						class="collapse navbar-collapse order-lg-1"
						id="mainNavbar">
						<ul class="navbar-nav ms-lg-4 mt-3 mt-lg-0 gap-lg-2">
							<li class="nav-item">
								<a
									class="nav-link"
									href="index.html">
									<i class="bi bi-house-door me-1"></i>Inicio
								</a>
							</li>
							<li class="nav-item">
								<a
									class="nav-link"
									href="jugadores.html">
									<i class="bi bi-person-badge me-1"></i>Jugadores
								</a>
							</li>
							<li class="nav-item">
								<a
									class="nav-link active"
									href="partidos.html">
									<i class="bi bi-calendar-event me-1"></i>Partidos
								</a>
							</li>
							<li class="nav-item">
								<a
									class="nav-link"
									href="estadisticas.html">
									<i class="bi bi-bar-chart me-1"></i>Estadísticas
								</a>
							</li>
						</ul>
					</div>
				</div>
			</nav>
		</header>
		<main>
			<!-- PARTIDOS -->
			<section
				id="partidos"
				class="section-space">
				<div class="container">
					<div class="section-heading mb-4">
						<span class="seccion-titulos">Calendario</span>
						<h2 class="section-title mb-1">Partidos ATP</h2>
						<p class="section-subtitle mb-0">
							Encuentros destacados del circuito ATP.
						</p>
					</div>

					<div class="d-flex flex-wrap gap-2 mb-4">
						<button
							class="btn btn-success btn-sm rounded-pill px-3 filter-btn active"
							data-filter="all">
							Todos
						</button>
						<button
							class="btn btn-outline-secondary btn-sm rounded-pill px-3 filter-btn"
							data-filter="live">
							En vivo
						</button>
						<button
							class="btn btn-outline-secondary btn-sm rounded-pill px-3 filter-btn"
							data-filter="final">
							Finalizados
						</button>
						<button
							class="btn btn-outline-secondary btn-sm rounded-pill px-3 filter-btn"
							data-filter="scheduled">
							Programados
						</button>
					</div>

					<div
						id="tournament-info"
						class="mb-3"></div>

					<div
						id="matches-container"
						class="match-list">
						<div class="text-center py-5">
							<div
								class="spinner-border text-success"
								role="status">
								<span class="visually-hidden">Cargando partidos...</span>
							</div>
							<p class="mt-3 text-secondary">
								Cargando información de partidos...
							</p>
						</div>
					</div>
					<div
						id="load-more-container"
						class="text-center mt-4"
						style="display: none">
						<button
							id="load-more-btn"
							class="btn btn-outline-success rounded-pill px-4">
							<i class="bi bi-plus-circle me-2"></i>Mostrar más (5)
						</button>
					</div>
				</div>
			</section>
		</main>
		<footer class="site-footer py-4">
			<div class="container">
				<div
					class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
					<p class="mb-0">© 2026 Top Tenis Stats</p>
					<p class="mb-0 small">
						Encuentra todo lo que necesitas saber del mundo del tenis
					</p>
				</div>
			</div>
		</footer>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

		<script src="js/partidos_script.js"></script>
		<script src="js/tema_script.js"></script>
	</body>
</html>
